<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ByteCanary</title>
<script type="importmap">
{ "imports": { "@huggingface/transformers": "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3" } }
</script>
<style>
  :root { --bg: #0d1117; --fg: #c9d1d9; --accent: #58a6ff; --green: #3fb950;
           --red: #f85149; --yellow: #d29922; --border: #30363d; --card: #161b22; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
         background: var(--bg); color: var(--fg); padding: 2rem; line-height: 1.6; }
  h1 { color: var(--accent); font-size: 1.4rem; margin-bottom: 0.5rem; }
  h2 { color: var(--fg); font-size: 1.1rem; margin: 1.5rem 0 0.5rem; }
  .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 1.5rem; }
  .controls { display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap; margin-bottom: 1rem; }
  .control-group { display: flex; flex-direction: column; gap: 0.2rem; }
  button { background: var(--accent); color: var(--bg); border: none; padding: 0.5rem 1.2rem;
           border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.85rem; font-weight: 600; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button:hover:not(:disabled) { filter: brightness(1.15); }
  button.secondary { background: var(--border); color: var(--fg); }
  button.secondary:hover:not(:disabled) { background: #484f58; }
  select, input[type=number], input[type=text] {
    background: var(--card); color: var(--fg); border: 1px solid var(--border);
    padding: 0.4rem 0.6rem; border-radius: 6px; font-family: inherit; font-size: 0.85rem; }
  input[type=number] { width: 5rem; }
  input[type=text] { width: 18rem; }
  textarea { background: var(--card); color: var(--fg); border: 1px solid var(--border);
             padding: 0.8rem; border-radius: 6px; font-family: inherit; font-size: 0.95rem;
             width: 100%; resize: vertical; }
  label { font-size: 0.8rem; color: #8b949e; }
  .progress { background: var(--border); border-radius: 4px; height: 6px; margin: 0.5rem 0; overflow: hidden; }
  .progress-bar { background: var(--accent); height: 100%; transition: width 0.2s; }
  #status { font-size: 0.8rem; color: #8b949e; min-height: 1.2em; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
          padding: 1rem; margin-bottom: 1rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th { text-align: left; color: #8b949e; font-weight: 500; padding: 0.4rem 0.6rem;
       border-bottom: 1px solid var(--border); }
  td { padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border); }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .good { color: var(--green); }
  .warn { color: var(--yellow); }
  .bad { color: var(--red); }
  .char-cell { font-size: 1.2rem; }
  .note { font-size: 0.75rem; color: #8b949e; margin-top: 1rem; padding: 0.8rem;
          border-left: 3px solid var(--yellow); background: rgba(210,153,34,0.08); border-radius: 0 4px 4px 0; }
  .note.info { border-left-color: var(--accent); background: rgba(88,166,255,0.08); }
  #error { color: var(--red); font-size: 0.85rem; margin: 0.5rem 0; display: none; }
  .mode-tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .mode-tab { padding: 0.6rem 1.2rem; cursor: pointer; font-size: 0.85rem; border: none; background: none;
              color: #8b949e; font-family: inherit; font-weight: 500;
              border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .mode-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .mode-tab:hover { color: var(--fg); }
  .mode-panel { display: none; }
  .mode-panel.active { display: block; }
  .tabs { display: flex; gap: 0; margin-bottom: -1px; }
  .tab { padding: 0.5rem 1rem; cursor: pointer; font-size: 0.8rem; border: 1px solid transparent;
         border-bottom: none; border-radius: 6px 6px 0 0; color: #8b949e; }
  .tab.active { background: var(--card); border-color: var(--border); color: var(--fg); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .badge { display: inline-block; font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 600; }
  .badge-common { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-uncommon { background: rgba(88,166,255,0.15); color: var(--accent); }
  .badge-rare { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge-unseen { background: rgba(248,81,73,0.15); color: var(--red); }
  .dfa-result { margin-top: 1rem; }
  .dfa-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.8rem; margin-top: 0.8rem; }
  .dfa-metric { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 0.8rem; }
  .dfa-metric .label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
  .dfa-metric .value { font-size: 1.4rem; margin-top: 0.3rem; }
  .byte-dump { font-size: 0.75rem; word-break: break-all; color: #8b949e; margin-top: 0.8rem;
               background: var(--bg); padding: 0.6rem; border-radius: 4px; }
  .byte-dump .valid { color: var(--green); }
  .byte-dump .invalid { color: var(--red); }
  .byte-dump .incomplete { color: var(--yellow); }
  .inject-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem; flex-wrap: wrap; }
  .inject-btn { background: var(--card); color: var(--fg); border: 1px solid var(--border);
                padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.8rem; }
  .inject-btn:hover { border-color: var(--accent); }
  .hidden { display: none; }
</style>
</head>
<body>

<h1>ByteCanary</h1>
<p class="subtitle">UTF-8 structural validity evaluation</p>

<div id="error"></div>

<div class="mode-tabs">
  <button class="mode-tab active" data-mode="playground">DFA Playground</button>
  <button class="mode-tab" data-mode="eval">Evaluation</button>
</div>

<!-- DFA Playground -->
<div class="mode-panel active" id="panel-playground">
  <div class="card">
    <label>Paste or type text to score through the UTF-8 DFA</label>
    <textarea id="dfaInput" rows="3" placeholder="Type any text here…"></textarea>
    <div class="inject-row">
      <span style="font-size:0.75rem;color:#8b949e">Test cases:</span>
      <button class="inject-btn" data-text="Hello, world!">ASCII</button>
      <button class="inject-btn" data-text="こんにちは世界">Japanese</button>
      <button class="inject-btn" data-text="한국어 텍스트">Korean</button>
      <button class="inject-btn" data-text="中文文本测试">Chinese</button>
      <button class="inject-btn" data-text="🎉🔥💯🌍">Emoji</button>
      <button class="inject-btn" data-hex="48 65 6c 6c 6f 80 ff 57 6f 72 6c 64">Invalid bytes</button>
      <button class="inject-btn" data-hex="e3 81 93 e3 82 93 e3 81 ab e3 81 a1 e3">Truncated 3-byte</button>
      <button class="inject-btn" data-hex="f0 9f 8e 89 f0 9f 94">Truncated 4-byte</button>
    </div>
  </div>
  <div class="dfa-result" id="dfaResult"></div>
</div>

<!-- Evaluation -->
<div class="mode-panel" id="panel-eval">
  <div class="controls">
    <div class="control-group">
      <label>Backend</label>
      <select id="backend">
        <option value="transformers-js">Transformers.js (full eval)</option>
        <option value="prompt-api">Prompt API (text-level)</option>
      </select>
    </div>

    <div class="control-group" id="hfModelGroup">
      <label>HuggingFace model</label>
      <input type="text" id="modelId" value="onnx-community/gpt2" placeholder="model ID or path">
    </div>

    <div class="control-group" id="hfDtypeGroup">
      <label>Dtype</label>
      <select id="dtype">
        <option value="q4">q4</option>
        <option value="q8">q8</option>
        <option value="fp16">fp16</option>
        <option value="fp32">fp32</option>
      </select>
    </div>

    <div class="control-group" id="prefixGroup">
      <label>Prefix bytes</label>
      <input type="number" id="prefixLen" value="2" min="1" max="3">
    </div>

    <div class="control-group">
      <label>Eval set</label>
      <select id="evalset">
        <option value="bundled">CJK 4000 (bundled)</option>
        <option value="custom">Load JSON…</option>
      </select>
      <input type="file" id="fileInput" accept=".json" style="display:none">
    </div>

    <div class="control-group">
      <label>Samples / lang</label>
      <input type="number" id="trialSamples" value="8" min="1" max="4000">
    </div>

    <div class="control-group">
      <label>Level 1 data</label>
      <input type="file" id="l1FileInput" accept=".json" multiple>
    </div>

    <div class="control-group" style="justify-content:flex-end">
      <button id="run">Run</button>
      <button id="exportBtn" class="secondary" disabled>Export JSON</button>
    </div>
  </div>

  <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div id="status">Ready</div>

  <div id="results" style="display:none">
    <h2>Results</h2>
    <div class="tabs" id="tabs"></div>
    <div id="tabContents"></div>
  </div>
</div>

<script type="module">
import { UTF8StateMachine, computeDualScore, detectLanguage } from "../dist/index.js";

const BUNDLED_URL = "../data/level0/cjk_4000.json";
const $ = (id) => document.getElementById(id);
const encoder = new TextEncoder();
let evalSet = null;
let lastResult = null;
let level1Data = null;

// ─── Mode tabs ───
document.querySelectorAll(".mode-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".mode-tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".mode-panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    $("panel-" + tab.dataset.mode).classList.add("active");
  });
});

// ─── Backend toggle ───
$("backend").addEventListener("change", () => updateBackendUI());
function updateBackendUI() {
  const isHF = $("backend").value === "transformers-js";
  $("hfModelGroup").classList.toggle("hidden", !isHF);
  $("hfDtypeGroup").classList.toggle("hidden", !isHF);
  $("prefixGroup").classList.toggle("hidden", !isHF);
}
updateBackendUI();

// ─── DFA Playground ───
const dfaInput = $("dfaInput");
let debounceTimer;
dfaInput.addEventListener("input", () => { clearTimeout(debounceTimer); debounceTimer = setTimeout(() => scoreDFA(), 50); });

document.querySelectorAll(".inject-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    if (btn.dataset.hex) {
      dfaInput.value = ""; dfaInput.dataset.rawHex = btn.dataset.hex;
      dfaInput.placeholder = `[raw bytes: ${btn.dataset.hex}]`;
      scoreDFA(btn.dataset.hex);
    } else {
      delete dfaInput.dataset.rawHex; dfaInput.placeholder = "";
      dfaInput.value = btn.dataset.text; scoreDFA();
    }
  });
});

function hexToBytes(hex) { return new Uint8Array(hex.trim().split(/\s+/).map(h => parseInt(h, 16))); }

function scoreDFA(rawHex) {
  const bytes = rawHex ? hexToBytes(rawHex) : encoder.encode(dfaInput.value);
  if (bytes.length === 0) { $("dfaResult").innerHTML = ""; return; }
  const score = computeDualScore(bytes);
  const colorClass = (v) => v >= 0.9 ? "good" : v >= 0.5 ? "warn" : "bad";
  let byteVis = "";
  for (const seg of annotateBytes(bytes)) byteVis += `<span class="${seg.cls}">${seg.hexes.join(" ")}</span> `;
  $("dfaResult").innerHTML = `
    <div class="dfa-grid">
      <div class="dfa-metric"><div class="label">V_partial</div><div class="value ${colorClass(score.partialScore)}">${score.partialScore.toFixed(4)}</div></div>
      <div class="dfa-metric"><div class="label">V_binary_strict</div><div class="value ${colorClass(score.binaryStrict)}">${score.binaryStrict.toFixed(0)}</div></div>
      <div class="dfa-metric"><div class="label">V_binary_soft</div><div class="value ${colorClass(score.binarySoft)}">${score.binarySoft.toFixed(4)}</div></div>
      <div class="dfa-metric"><div class="label">Valid chars</div><div class="value">${score.validChars}</div></div>
      <div class="dfa-metric"><div class="label">Invalid bytes</div><div class="value ${score.invalidBytes > 0 ? 'bad' : 'good'}">${score.invalidBytes}</div></div>
      <div class="dfa-metric"><div class="label">Total bytes</div><div class="value">${score.totalBytes}</div></div>
      <div class="dfa-metric"><div class="label">Final state</div><div class="value" style="font-size:0.9rem">${score.finalState}</div></div>
      <div class="dfa-metric"><div class="label">Complete</div><div class="value">${score.isComplete ? "Yes" : "No"}</div></div>
    </div>
    <div class="byte-dump"><strong style="color:var(--fg)">Byte map:</strong>
      <span class="valid">valid</span> <span class="invalid">invalid</span> <span class="incomplete">incomplete</span><br><br>${byteVis}</div>`;
}

function annotateBytes(data) {
  const segments = [];
  let i = 0;
  while (i < data.length) {
    const b = data[i];
    if (b <= 0x7f) { segments.push({ cls: "valid", hexes: [hex(b)] }); i++; }
    else if (b >= 0xc2 && b <= 0xdf) { i = consumeMulti(data, i, 2, segments); }
    else if (b >= 0xe0 && b <= 0xef) { i = consumeMulti(data, i, 3, segments); }
    else if (b >= 0xf0 && b <= 0xf4) { i = consumeMulti(data, i, 4, segments); }
    else { segments.push({ cls: "invalid", hexes: [hex(b)] }); i++; }
  }
  return segments;
}
function consumeMulti(data, start, expected, segments) {
  const hexes = [hex(data[start])];
  let j = start + 1;
  while (j < start + expected && j < data.length && data[j] >= 0x80 && data[j] <= 0xbf) { hexes.push(hex(data[j])); j++; }
  segments.push({ cls: j - start === expected ? "valid" : j >= data.length ? "incomplete" : "invalid", hexes });
  return j;
}
function hex(b) { return b.toString(16).padStart(2, "0"); }

// ─── Eval data loading ───
$("evalset").addEventListener("change", (e) => { if (e.target.value === "custom") $("fileInput").click(); });
$("fileInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  evalSet = JSON.parse(await file.text());
  $("evalset").options[1].text = file.name;
  showStatus(`Loaded ${evalSet.char_frequencies.length} characters from ${file.name}`);
});

$("l1FileInput").addEventListener("change", async (e) => {
  level1Data = {};
  for (const file of e.target.files) {
    const data = JSON.parse(await file.text());
    if (Array.isArray(data) && data.length > 0 && data[0].language) {
      const lang = data[0].language;
      level1Data[lang] = data;
      showStatus(`Level 1: loaded ${data.length} samples for ${lang}`);
    }
  }
});

$("exportBtn").addEventListener("click", () => {
  if (!lastResult) return;
  const blob = new Blob([JSON.stringify(lastResult, (k, v) => v instanceof Uint8Array ? Array.from(v) : v, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `bytecanary_${new Date().toISOString().slice(0,19).replace(/:/g,"-")}.json`;
  a.click();
});

// ─── Run evaluation ───
$("run").addEventListener("click", async () => {
  $("run").disabled = true;
  $("exportBtn").disabled = true;
  $("results").style.display = "none";
  $("error").style.display = "none";
  $("progressBar").style.width = "0%";

  try {
    if (!evalSet) {
      showStatus("Loading bundled eval set…");
      const resp = await fetch(BUNDLED_URL);
      if (!resp.ok) throw new Error(`Failed to load eval set: ${resp.status}`);
      evalSet = await resp.json();
    }

    const backend = $("backend").value;
    const trialSamples = parseInt($("trialSamples").value) || 8;

    if (backend === "transformers-js") {
      await runHF(trialSamples);
    } else {
      await runPromptAPI(trialSamples);
    }

    $("exportBtn").disabled = false;
  } catch (e) {
    $("error").textContent = e.message;
    $("error").style.display = "block";
    showStatus("Error");
    console.error(e);
  } finally {
    $("run").disabled = false;
  }
});

async function runHF(trialSamples) {
  const { evaluateHF } = await import("../dist/hf-evaluate.js");
  const modelId = $("modelId").value.trim();
  if (!modelId) throw new Error("Enter a model ID");

  const result = await evaluateHF(evalSet, {
    model: modelId,
    dtype: $("dtype").value,
    prefixLength: parseInt($("prefixLen").value) || 2,
    maxNewTokens: 5,
    trialSamples,
    level1Data: level1Data,
    onProgress: (msg, done, total) => {
      if (total > 0) $("progressBar").style.width = Math.round((done / total) * 100) + "%";
      showStatus(msg);
    },
    onModelProgress: (p) => {
      if (p.progress !== undefined) {
        showStatus(`Downloading ${p.file ?? "model"}: ${Math.round(p.progress)}%`);
        $("progressBar").style.width = Math.round(p.progress) + "%";
      } else {
        showStatus(p.status);
      }
    },
  });

  lastResult = result;
  renderHFResults(result);
  showStatus(`Done — ${result.model}, ${result.tokenizerType}, ${result.byteCoverage}/256 byte tokens`);
}

async function runPromptAPI(trialSamples) {
  const promptAPI = findLanguageModel();
  if (!promptAPI) throw new Error(
    "No Prompt API found. typeof LanguageModel=" + typeof LanguageModel +
    ", window.ai=" + typeof window.ai
  );

  const session = await promptAPI.create();
  const languages = ["ja", "ko", "zh"];
  const grouped = new Map();
  for (const lang of languages) grouped.set(lang, []);
  for (const entry of evalSet.char_frequencies) {
    const lang = detectLanguage(entry.char);
    if (grouped.has(lang)) grouped.get(lang).push(entry);
  }

  const langResults = {};
  let done = 0;
  let total = 0;
  for (const [, chars] of grouped) total += Math.min(trialSamples, chars.length);

  for (const [lang, chars] of grouped) {
    if (chars.length === 0) continue;
    const subset = chars.slice(0, trialSamples);
    const results = [];

    for (const entry of subset) {
      const prompt = `Continue this character sequence. Output ONLY the next few characters, nothing else.\n\n${entry.char}`;
      let generated;
      try { generated = await session.prompt(prompt); } catch { generated = ""; }

      const genBytes = encoder.encode(generated);
      const dfa = computeDualScore(genBytes);

      results.push({
        char: entry.char, codepoint: entry.codepoint, tier: entry.tier,
        language: lang, generated, dfa, isValidUtf8: dfa.binaryStrict === 1.0,
      });
      done++;
      $("progressBar").style.width = Math.round((done / total) * 100) + "%";
      showStatus(`${done}/${total} — ${entry.char} (${entry.tier}) → V=${dfa.partialScore.toFixed(3)}`);
    }

    const byTier = {};
    const tierGroups = new Map();
    for (const r of results) { if (!tierGroups.has(r.tier)) tierGroups.set(r.tier, []); tierGroups.get(r.tier).push(r); }
    for (const [tier, tr] of tierGroups) byTier[tier] = aggSimple(tr);

    langResults[lang] = { language: lang, totalCharacters: results.length, overallStats: aggSimple(results), byTier, results };
  }
  session.destroy();

  lastResult = { model: "Prompt API", timestamp: new Date().toISOString(), languages: langResults };
  renderPromptAPIResults(lastResult);
  showStatus(`Done — Prompt API, ${Object.keys(langResults).length} languages`);
}

function findLanguageModel() {
  if (typeof LanguageModel !== "undefined") return LanguageModel;
  if (window.ai?.languageModel) return window.ai.languageModel;
  if (self.ai?.languageModel) return self.ai.languageModel;
  return null;
}

function aggSimple(results) {
  const n = results.length;
  if (n === 0) return { totalSamples: 0, validUtf8Rate: 0, avgDfaPartial: 0, avgDfaStrict: 0, avgDfaSoft: 0 };
  return {
    totalSamples: n,
    validUtf8Rate: results.filter(r => r.isValidUtf8 ?? r.dfa.binaryStrict === 1).length / n,
    avgDfaPartial: results.reduce((s, r) => s + r.dfa.partialScore, 0) / n,
    avgDfaStrict: results.reduce((s, r) => s + r.dfa.binaryStrict, 0) / n,
    avgDfaSoft: results.reduce((s, r) => s + r.dfa.binarySoft, 0) / n,
  };
}

function showStatus(msg) { $("status").textContent = msg; }

// ─── Results rendering ───

function renderHFResults(result) {
  $("results").style.display = "block";
  const tabsEl = $("tabs"); tabsEl.innerHTML = "";
  const contentsEl = $("tabContents"); contentsEl.innerHTML = "";

  const langs = Object.keys(result.languages);
  langs.forEach((lang, i) => {
    const tab = document.createElement("div");
    tab.className = "tab" + (i === 0 ? " active" : "");
    tab.textContent = lang.toUpperCase(); tab.dataset.lang = lang;
    tab.addEventListener("click", () => switchTab(lang));
    tabsEl.appendChild(tab);

    const content = document.createElement("div");
    content.className = "tab-content card" + (i === 0 ? " active" : "");
    content.id = "tab-" + lang;
    content.innerHTML = renderHFLang(result.languages[lang]);
    contentsEl.appendChild(content);
  });
}

function renderHFLang(lr) {
  let html = `<p>${lr.totalCharacters} characters (Level 0)</p>`;
  html += `<h2>Overall</h2>`;
  html += hfStatsTable(lr.overallStats);
  html += `<h2>By Tier</h2>` + hfTierTable(lr.byTier);

  html += `<h2>Samples</h2>`;
  html += `<table><tr><th>Char</th><th>Tier</th><th class="num">V_partial</th><th class="num">V_strict</th>` +
           `<th class="num">PPL</th><th class="num">ΔLL</th></tr>`;
  for (const r of lr.results.slice(0, 100)) {
    const cls = r.dfa.partialScore >= 0.9 ? "good" : r.dfa.partialScore >= 0.5 ? "warn" : "bad";
    const dCls = r.deltaLL > 0 ? "good" : r.deltaLL < 0 ? "bad" : "";
    html += `<tr><td class="char-cell">${esc(r.char)}</td>` +
            `<td><span class="badge badge-${r.tier}">${r.tier}</span></td>` +
            `<td class="num ${cls}">${r.dfa.partialScore.toFixed(4)}</td>` +
            `<td class="num">${r.dfa.binaryStrict.toFixed(0)}</td>` +
            `<td class="num">${isFinite(r.perplexity) ? r.perplexity.toFixed(1) : "∞"}</td>` +
            `<td class="num ${dCls}">${r.deltaLL.toFixed(2)}</td></tr>`;
  }
  html += `</table>`;

  if (lr.level1) {
    html += `<h2>Level 1: Context-Guided (${lr.level1.totalSamples} samples)</h2>`;
    html += hfStatsTable(lr.level1.stats);
    html += `<table><tr><th>Term</th><th class="num">Match</th><th class="num">V_partial</th>` +
             `<th class="num">PPL</th><th class="num">ΔLL</th></tr>`;
    for (const r of lr.level1.results.slice(0, 100)) {
      const cls = r.dfa.partialScore >= 0.9 ? "good" : r.dfa.partialScore >= 0.5 ? "warn" : "bad";
      html += `<tr><td class="char-cell">${esc(r.term)}</td>` +
              `<td class="num ${r.termMatch ? "good" : "bad"}">${r.termMatch ? "✓" : "✗"}</td>` +
              `<td class="num ${cls}">${r.dfa.partialScore.toFixed(4)}</td>` +
              `<td class="num">${isFinite(r.perplexity) ? r.perplexity.toFixed(1) : "∞"}</td>` +
              `<td class="num">${r.deltaLL.toFixed(2)}</td></tr>`;
    }
    html += `</table>`;
  }
  return html;
}

function hfStatsTable(s) {
  let html = `<table>`;
  html += `<tr><td>V_partial</td><td class="num">${s.avgVPartial.toFixed(4)}</td></tr>`;
  html += `<tr><td>V_binary_strict</td><td class="num">${s.avgVBinaryStrict.toFixed(4)}</td></tr>`;
  html += `<tr><td>V_binary_soft</td><td class="num">${s.avgVBinarySoft.toFixed(4)}</td></tr>`;
  html += `<tr><td>Perplexity</td><td class="num">${isFinite(s.avgPerplexity) ? s.avgPerplexity.toFixed(2) : "∞"}</td></tr>`;
  html += `<tr><td>Gold better / Gen better / Equal</td><td class="num">${s.goldBetterCount} / ${s.genBetterCount} / ${s.equalCount}</td></tr>`;
  if (s.termMatchRate !== undefined) html += `<tr><td>Term Match Rate</td><td class="num">${(s.termMatchRate * 100).toFixed(1)}%</td></tr>`;
  html += `</table>`;
  return html;
}

function hfTierTable(byTier) {
  let html = `<table><tr><th>Tier</th><th class="num">N</th><th class="num">V_partial</th>` +
             `<th class="num">V_strict</th><th class="num">V_soft</th><th class="num">PPL</th>` +
             `<th class="num">Gold>Gen</th></tr>`;
  for (const [tier, s] of Object.entries(byTier)) {
    html += `<tr><td><span class="badge badge-${tier}">${tier}</span></td>` +
            `<td class="num">${s.count}</td>` +
            `<td class="num">${s.avgVPartial.toFixed(4)}</td>` +
            `<td class="num">${s.avgVBinaryStrict.toFixed(4)}</td>` +
            `<td class="num">${s.avgVBinarySoft.toFixed(4)}</td>` +
            `<td class="num">${isFinite(s.avgPerplexity) ? s.avgPerplexity.toFixed(1) : "∞"}</td>` +
            `<td class="num">${s.goldBetterCount}/${s.count}</td></tr>`;
  }
  html += `</table>`;
  return html;
}

function renderPromptAPIResults(result) {
  $("results").style.display = "block";
  const tabsEl = $("tabs"); tabsEl.innerHTML = "";
  const contentsEl = $("tabContents"); contentsEl.innerHTML = "";
  const langs = Object.keys(result.languages);
  langs.forEach((lang, i) => {
    const tab = document.createElement("div");
    tab.className = "tab" + (i === 0 ? " active" : "");
    tab.textContent = lang.toUpperCase(); tab.dataset.lang = lang;
    tab.addEventListener("click", () => switchTab(lang));
    tabsEl.appendChild(tab);

    const content = document.createElement("div");
    content.className = "tab-content card" + (i === 0 ? " active" : "");
    content.id = "tab-" + lang;
    const lr = result.languages[lang];
    let html = `<p>${lr.totalCharacters} characters</p>`;
    html += simpleStatsTable(lr.overallStats);
    html += `<table><tr><th>Char</th><th>Tier</th><th>Generated</th><th class="num">V_partial</th></tr>`;
    for (const r of lr.results.slice(0, 50)) {
      const cls = r.dfa.partialScore >= 0.9 ? "good" : r.dfa.partialScore >= 0.5 ? "warn" : "bad";
      html += `<tr><td class="char-cell">${esc(r.char)}</td>` +
              `<td><span class="badge badge-${r.tier}">${r.tier}</span></td>` +
              `<td>${esc((r.generated ?? "").slice(0, 30))}</td>` +
              `<td class="num ${cls}">${r.dfa.partialScore.toFixed(4)}</td></tr>`;
    }
    html += `</table>`;
    content.innerHTML = html;
    contentsEl.appendChild(content);
  });
}

function simpleStatsTable(s) {
  return `<table>` +
    `<tr><td>Valid UTF-8</td><td class="num">${(s.validUtf8Rate * 100).toFixed(1)}%</td></tr>` +
    `<tr><td>V_partial</td><td class="num">${s.avgDfaPartial.toFixed(4)}</td></tr>` +
    `<tr><td>V_binary_strict</td><td class="num">${s.avgDfaStrict.toFixed(4)}</td></tr>` +
    `</table>`;
}

function switchTab(lang) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.lang === lang));
  document.querySelectorAll(".tab-content").forEach(c => c.classList.toggle("active", c.id === "tab-" + lang));
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
</script>

</body>
</html>
